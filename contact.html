<section class="contact">

    <div class="contact-container">

        <div class="contact-title">

            <h2>Kontaktieren Sie uns</h2>

            <p>
                Senden Sie uns Ihre Anfrage.
                Wir melden uns innerhalb von 24 Stunden.
            </p>

        </div>

       <form id="bookingForm"
      action="https://api.web3forms.com/submit"
      method="POST">
           <input type="hidden"
       name="access_key"
       value="ca41842f-368e-4633-9a32-633c117ecf41">

            <div class="row">

                <div class="input-group">

                    <label>Vorname </label>

                    
<input
type="text"
id="firstName"
name="Vorname"
required>
                    
                    
                </div>

                <div class="input-group">

                    <label>Nachname </label>

                  <input
type="text"
id="lastName"
name="Nachname"
required>

                </div>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Telefon *</label>

                  <input
type="tel"
id="phone"
name="Telefon"
placeholder="+41..."
required>

                </div>

                <div class="input-group">

                    <label>E-Mail *</label>

                    <input
type="email"
id="email"
name="E-Mail"
required>

                </div>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Anreisedatum</label>

                  <input
type="date"
id="checkin"
name="Check-in">

                </div>

                <div class="input-group">

                    <label>Abreisedatum</label>

                    <input
type="date"
id="checkout"
name="Check-out">

                </div>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Nächte</label>

                   <input
type="number"
id="nights"
name="Nächte"
readonly>

                </div>

            </div>

            <div class="guests">

                <h3>Gäste</h3>

                <div class="guest-row">

                    <span>Erwachsene</span>

                    <div class="counter">

                        <button type="button" class="minus">−</button>

                        <span id="adults">2</span>

                        <button type="button" class="plus">+</button>

                    </div>

                </div>

                <div class="guest-row">

                    <span>Kinder</span>

                    <div class="counter">

                        <button type="button" class="minus-child">−</button>

                        <span id="children">0</span>

                        <button type="button" class="plus-child">+</button>

                    </div>

                </div>

            </div>

            <div class="input-group">
<input type="hidden" id="adultsInput" name="Erwachsene">
<input type="hidden" id="childrenInput" name="Kinder">
<input type="hidden" id="totalGuestsInput" name="Gesamt Gäste">
                <label>Kommentar</label>

              <textarea
id="message"
name="Kommentar"
rows="6"
placeholder="Ihre Nachricht..."></textarea>

            </div>

            <button class="send-button">

                Anfrage senden

            </button>

        </form>

    </div>

</section>
