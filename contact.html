<section class="contact">

    <div class="contact-container">

        <div class="contact-title">

            <h2>Kontaktieren Sie uns</h2>

            <p>
                Senden Sie uns Ihre Anfrage.
                Wir melden uns innerhalb von 24 Stunden.
            </p>

        </div>

        <form id="bookingForm">

            <div class="row">

                <div class="input-group">

                    <label>Vorname *</label>

                    <input
                        type="text"
                        id="firstName"
                        required>

                </div>

                <div class="input-group">

                    <label>Nachname *</label>

                    <input
                        type="text"
                        id="lastName"
                        required>

                </div>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Telefon *</label>

                    <input
                        type="tel"
                        id="phone"
                        placeholder="+41..."
                        required>

                </div>

                <div class="input-group">

                    <label>E-Mail *</label>

                    <input
                        type="email"
                        id="email"
                        required>

                </div>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Anreisedatum</label>

                    <input
                        type="date"
                        id="checkin">

                </div>

                <div class="input-group">

                    <label>Abreisedatum</label>

                    <input
                        type="date"
                        id="checkout">

                </div>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Nächte</label>

                    <input
                        type="number"
                        id="nights"
                        readonly>

                </div>

            </div>

            <div class="guests">

                <h3>Gäste</h3>

                <div class="guest-row">

                    <span>Erwachsene</span>

                    <div class="counter">

                        <button type="button" class="minus">−</button>

                        <span id="adults">2</span>

                        <button type="button" class="plus">+</button>

                    </div>

                </div>

                <div class="guest-row">

                    <span>Kinder</span>

                    <div class="counter">

                        <button type="button" class="minus-child">−</button>

                        <span id="children">0</span>

                        <button type="button" class="plus-child">+</button>

                    </div>

                </div>

            </div>

            <div class="input-group">

                <label>Kommentar</label>

                <textarea
                    id="message"
                    rows="6"
                    placeholder="Ihre Nachricht..."></textarea>

            </div>

            <button class="send-button">

                Anfrage senden

            </button>

        </form>

    </div>

</section>
